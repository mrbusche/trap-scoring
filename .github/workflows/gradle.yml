name: Main Branch

on:
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: [ 25, 26 ]
        os: [ ubuntu-latest, macos-latest, windows-latest ]

    steps:
      - name: Check out code
        uses: actions/checkout@v7

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java-version }}

      - name: Setup and execute Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run Gradle build
        env:
          SPRING_PROFILES_ACTIVE: test
        run: ./gradlew build --parallel --configuration-cache -PjavaVersion=${{ matrix.java-version }}

      - name: Generate file
        run: |
          cd build/libs/
          ls -ltra
          mv trap-*.jar trap.jar
          java -jar trap.jar

      - name: Test file exists
        run: |
          cd build/libs/
          test -f league-data-*.xlsx || exit 1

      - name: Test file was generated properly
        run: |
          cd build/libs/
          file1size=$(stat -c %s league-data-*.xlsx)
          echo "file 1 size successful"
          file2size=$(stat -c %s ../../src/main/resources/main-template.xlsx)
          echo "file 2 size successful"
          echo "file1size"
          echo $file1size
          echo "file2size"
          echo $file2size
          if [ "$file1size" -lt "$file2size" ]; then
            echo "file 1 is smaller"
            exit 1
          fi

  compare-generated-files:
    name: compare-generated-files
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up JDK 26
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 26

      - name: Setup and execute Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Generate file from current branch
        run: |
          ./gradlew build --parallel --configuration-cache -PjavaVersion=26 -x test
          cd build/libs/
          mv trap-*.jar trap.jar
          java -jar trap.jar
          mv league-data-*.xlsx ../../league-data-current.xlsx

      - name: Generate file from main branch
        run: |
          git fetch origin main:refs/remotes/origin/main
          git worktree add ../trap-scoring-main origin/main
          cd ../trap-scoring-main
          ./gradlew build --parallel --configuration-cache -PjavaVersion=26 -x test
          cd build/libs/
          mv trap-*.jar trap.jar
          java -jar trap.jar
          mv league-data-*.xlsx ../../../trap-scoring/main-branch.xlsx

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Compare generated files
        run: |
          cd comparison/
          uv run python main.py ../main-branch.xlsx

      - name: Clean up git worktree
        if: always()
        run: |
          git worktree remove ../trap-scoring-main --force

  all-checks-passed:
    runs-on: ubuntu-latest
    needs: [ build, compare-generated-files ]
    if: always()
    steps:
      - name: Check status of all required jobs
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') ||
            contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more dynamic checks failed."
            exit 1
          fi
          echo "All checks passed!"
